<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="50%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#FBBF24" />
    </linearGradient>
  </defs>
  
  <!-- Top Row (Center and Right) -->
  <rect x="100" y="0" width="200" height="100" fill="url(#grad)" />
  
  <!-- Middle Row (Left and Center) -->
  <rect x="0" y="100" width="200" height="100" fill="url(#grad)" />
  
  <!-- Bottom Row (Left) -->
  <rect x="0" y="200" width="100" height="100" fill="url(#grad)" />
  
  <!-- Bottom Row (Right) -->
  <rect x="200" y="200" width="100" height="100" fill="url(#grad)" />
</svg>
